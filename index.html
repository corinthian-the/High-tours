<!DOCTYPE html>
<html>
<head>

<title>Hightours Travel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Hightours</h1>

<nav>

<a href="#home">Home</a>
<a href="#tours">Tours</a>
<a href="#gallery">Gallery</a>
<a href="#booking">Booking</a>
<a href="#contact">Contact</a>

<button id="darkToggle">🌙</button>

</nav>

</header>

<section class="hero" id="home">

<h2>Explore the World With Hightours</h2>

<a href="#booking" class="btn">Book Now</a>

</section>

<section id="tours">

<h2>Popular Tours</h2>

<div class="tour-container">

<div class="tour-card">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<h3>Safari Tour</h3>

<p>$250</p>

</div>

<div class="tour-card">

<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

<h3>Beach Tour</h3>

<p>$180</p>

</div>

<div class="tour-card">

<img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98">

<h3>Mountain Tour</h3>

<p>$300</p>

</div>

</div>

</section>

<section id="booking">

<h2>Book Your Tour</h2>

<form id="bookingForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<select id="tour">

<option>Safari Tour</option>
<option>Beach Tour</option>
<option>Mountain Tour</option>

</select>

<input type="date" id="date">

<button type="submit">Book Tour</button>

</form>

</section>

<section id="contact">

<h2>Contact</h2>

<p>Email: hightours@email.com</p>

<a class="whatsapp" href="https://wa.me/254700000000">Chat on WhatsApp</a>

</section>

<section>

<h2>Location</h2>

<iframe
src="https://maps.google.com/maps?q=nairobi&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%"
height="300">
</iframe>

</section>

<footer>

<p>© 2026 Hightours</p>

</footer>

<script src="script.js"></script>
<script src="booking.js"></script>

</body>
</html>
